<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ঈদ সালামি হুইল 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>ফারহান রাব্বির পক্ষ থেকে ঈদ সালামি 🎉</h1>
        
        <div class="wheel-outer-ring">
            <div class="wheel-container">
                <div id="pointer">▼</div> 
                <canvas id="wheel" width="500" height="500"></canvas>
            </div>
        </div>

        <button id="spin">ঘোরাও!</button>

        <div id="result-box">
            <h2 id="result-text">অভিনন্দন! আপনি পেয়েছেন:</h2>
            <h1 id="result-amount"></h1>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
